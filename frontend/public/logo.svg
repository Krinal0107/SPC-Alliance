<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73f5;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0a40b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056b3;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main hexagon background -->
  <path d="M20 4 L32 12 L32 28 L20 36 L8 28 L8 12 Z" fill="url(#logoGradient)" filter="url(#glow)"/>

  <!-- Inner hexagon -->
  <path d="M20 10 L28 14 L28 26 L20 30 L12 26 L12 14 Z" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>

  <!-- Central dot -->
  <circle cx="20" cy="20" r="3" fill="white"/>

  <!-- Corner connection points -->
  <circle cx="20" cy="8" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="30" cy="13" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="30" cy="27" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="20" cy="32" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="10" cy="27" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="10" cy="13" r="1.5" fill="white" opacity="0.9"/>

  <!-- Subtle inner connections -->
  <line x1="20" y1="20" x2="20" y2="10" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="20" x2="26" y2="15" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="20" x2="26" y2="25" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="20" x2="20" y2="28" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="20" x2="14" y2="25" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="20" x2="14" y2="15" stroke="white" stroke-width="1" opacity="0.6"/>
</svg>